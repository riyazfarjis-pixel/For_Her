
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Friend</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

header{
background:#ff4081;
color:white;
padding:15px;
text-align:center;
}

.chatbox{
padding:20px;
height:60vh;
overflow:auto;
}

.ai{
background:white;
padding:12px;
border-radius:10px;
margin-bottom:15px;
width:80%;
}

input{
width:70%;
padding:12px;
}

button{
padding:12px;
background:#ff4081;
color:white;
border:none;
}
</style>

</head>

<body>

<header>
<h2>🤖 SafeHer AI Friend</h2>
</header>

<div class="chatbox">
<div class="ai">
Hello 👋

I'm your AI Friend.

How are you feeling today?
</div>
</div>

<center>

<input
type="text"
placeholder="Type your message...">

<button>Send</button>

</center>
<script src="script.js"></script>
</body>
</html>
